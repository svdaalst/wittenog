name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish
        run: dotnet publish src/WitteNog.App/WitteNog.App.csproj -f net9.0-windows10.0.19041.0 -c Release -o publish/windows

      - name: Create ZIP
        run: Compress-Archive -Path publish/windows/* -DestinationPath WitteNog-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WitteNog-${{ github.ref_name }}.zip
          generate_release_notes: true
