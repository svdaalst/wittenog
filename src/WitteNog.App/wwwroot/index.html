<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!--
      CSP is now the PRIMARY defense against XSS from synced/imported/transcribed notes.
      Markdig no longer strips raw HTML (that broke the inline task-checkbox button and
      the wiki-link span pre-injection). Instead, script-src 'self' (no 'unsafe-inline')
      means a <script> tag injected into a rendered note simply will not execute.
      All app inline scripts have been moved to js/global-keybindings.js so 'unsafe-inline'
      can stay disabled. img-src includes data: for base64 attachment images produced by
      MarkdownRenderer.Render. style-src keeps 'unsafe-inline' for Blazor's component
      style-isolation injection.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
    <title>Witte nog?</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="WitteNog.App.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>
    <div class="status-bar-safe-area"></div>
    <div id="app">Laden...</div>

    <div id="blazor-error-ui">
        Er is een onverwachte fout opgetreden.
        <a href="" class="reload">Herladen</a>
        <a class="dismiss">×</a>
    </div>


    <script src="js/global-keybindings.js"></script>
    <script src="js/tiptap-bridge.js"></script>
    <script src="js/flow-canvas.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
</body>

</html>
